<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coctelería">
<meta name="theme-color" content="#1a0c0c">
<title>Coctelería</title>
<style>
  :root{
    --bg:#1a0c0c; --bg2:#241010; --card:#2c1413; --card2:#371917;
    --line:#48201e; --text:#f2e4e0; --muted:#b89089; --soft:#8f6a64;
    --accent:#b23a32; --accent2:#d4564a; --gold:#c98b5e; --shadow:rgba(0,0,0,.55);
    --serif:Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:linear-gradient(180deg,#1a0c0c,#100707);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:760px;margin:0 auto;padding:26px 18px 110px}

  /* Header */
  header{text-align:center;padding-bottom:18px;border-bottom:1px solid var(--line);margin-bottom:20px}
  header .brand{font-family:var(--serif);font-size:1.9rem;font-weight:400;letter-spacing:2px;margin:0}
  header .rule{width:46px;height:2px;background:var(--accent);margin:10px auto 0}
  header .sub{color:var(--soft);font-size:.72rem;letter-spacing:2.5px;text-transform:uppercase;margin:12px 0 0}

  /* Toolbar: search + filter */
  .toolbar{display:flex;gap:10px;margin-bottom:18px}
  .search{flex:1;position:relative}
  .search input{
    width:100%;padding:12px 14px 12px 40px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:1rem;outline:none;
  }
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--soft)}
  .selectwrap{position:relative;flex:0 0 auto}
  .selectwrap select{
    appearance:none;-webkit-appearance:none;height:100%;
    padding:12px 36px 12px 15px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:.92rem;font-weight:600;outline:none;cursor:pointer;
  }
  .selectwrap select:focus{border-color:var(--accent)}
  .selectwrap::after{
    content:"";position:absolute;right:14px;top:50%;width:7px;height:7px;border-right:2px solid var(--muted);
    border-bottom:2px solid var(--muted);transform:translateY(-65%) rotate(45deg);pointer-events:none;
  }

  .count{color:var(--soft);font-size:.74rem;letter-spacing:1.5px;text-transform:uppercase;margin:0 2px 14px}

  /* Cards */
  .grid{display:grid;gap:14px}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 18px 16px;
    box-shadow:0 4px 14px var(--shadow);cursor:pointer;transition:transform .12s,border-color .15s;
  }
  .card:active{transform:scale(.99)}
  .card:hover{border-color:#5c2926}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .card h3{margin:0;font-family:var(--serif);font-size:1.25rem;font-weight:400;letter-spacing:.3px;line-height:1.2}
  .card .star{flex-shrink:0;margin-top:2px}
  .card .cat{display:block;color:var(--accent2);font-size:.68rem;letter-spacing:1.8px;text-transform:uppercase;margin-top:7px;font-weight:700}
  .card p.ing{margin:11px 0 0;color:var(--muted);font-size:.88rem;line-height:1.45}
  .card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:11px}
  .tag{font-size:.7rem;letter-spacing:.5px;padding:3px 9px;border-radius:4px;background:rgba(178,58,50,.12);color:var(--gold);border:1px solid rgba(178,58,50,.28)}

  .empty{text-align:center;color:var(--soft);padding:70px 24px;font-size:.95rem;line-height:1.6}
  .empty .line{width:40px;height:1px;background:var(--line);margin:0 auto 18px}

  /* Bottom bar */
  .bottombar{
    position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;gap:10px;
    background:var(--bg2);border-top:1px solid var(--line);box-shadow:0 -4px 20px var(--shadow);
    padding:12px 18px calc(12px + env(safe-area-inset-bottom));max-width:760px;margin:0 auto;
  }
  .bar-btn{
    flex:1;padding:13px 10px;border-radius:9px;border:1px solid var(--line);background:var(--card);
    color:var(--muted);font-size:.74rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:.15s;
  }
  .bar-btn:active{transform:scale(.97)}
  .bar-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;flex:1.4}
  .bar-btn.primary:active{background:var(--accent2)}

  /* Overlay / sheet */
  .overlay{position:fixed;inset:0;background:rgba(8,4,4,.72);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .sheet{
    background:var(--bg2);width:100%;max-width:680px;max-height:92vh;overflow-y:auto;
    border-radius:18px 18px 0 0;border:1px solid var(--line);border-bottom:none;
    padding:10px 22px calc(28px + env(safe-area-inset-bottom));animation:up .25s ease;
  }
  @media(min-width:700px){.overlay{align-items:center}.sheet{border-radius:14px;border-bottom:1px solid var(--line);max-height:88vh}}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .grip{width:40px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 18px}
  .sheet .d-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .sheet h2{margin:0;font-family:var(--serif);font-size:1.7rem;font-weight:400;letter-spacing:.4px;line-height:1.15}
  .d-cat{color:var(--accent2);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin:14px 0 0}
  .detail-tags{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0 4px}
  .section-t{color:var(--gold);font-size:.72rem;text-transform:uppercase;letter-spacing:2px;margin:24px 0 12px;font-weight:700;padding-bottom:7px;border-bottom:1px solid var(--line)}
  .ing-list{list-style:none;padding:0;margin:0}
  .ing-list li{padding:9px 0;border-bottom:1px solid rgba(72,32,30,.5);display:flex;justify-content:space-between;gap:12px;font-size:.96rem}
  .ing-list li:last-child{border-bottom:none}
  .ing-list li .q{color:var(--gold);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
  .steps{padding-left:0;margin:0;list-style:none;counter-reset:s}
  .steps li{position:relative;padding:4px 0 16px 38px;font-size:.96rem;line-height:1.5;counter-increment:s}
  .steps li:last-child{padding-bottom:0}
  .steps li::before{
    content:counter(s);position:absolute;left:0;top:2px;width:26px;height:26px;border-radius:50%;
    border:1px solid var(--accent);color:var(--accent2);font-weight:700;font-size:.82rem;
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);
  }
  .notes{color:var(--muted);font-size:.92rem;line-height:1.55;font-style:italic;font-family:var(--serif)}
  .detail-actions{display:flex;gap:10px;margin-top:28px}
  .btn{flex:1;padding:13px;border-radius:9px;border:1px solid var(--line);font-size:.78rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;background:var(--card);color:var(--text)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.danger{flex:0 0 auto;padding:13px 18px;background:transparent;color:var(--accent2);border-color:rgba(178,58,50,.45)}
  .star{cursor:pointer}

  /* Form */
  .field{margin-bottom:15px}
  .field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .field input,.field textarea{
    width:100%;padding:11px 13px;border-radius:9px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:1rem;outline:none;font-family:inherit;
  }
  .field input:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:74px;line-height:1.45}
  .field .hint{font-size:.72rem;color:var(--soft);margin-top:6px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--card2);border:1px solid var(--accent);color:var(--text);
    padding:11px 22px;border-radius:9px;font-size:.86rem;z-index:80;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 22px var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 class="brand">Coctelería</h1>
    <div class="rule"></div>
    <p class="sub">Carta personal</p>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Buscar cóctel o ingrediente" autocomplete="off">
    </div>
    <div class="selectwrap">
      <select id="catFilter" aria-label="Filtrar por categoría"></select>
    </div>
  </div>

  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
</div>

<div class="bottombar">
  <button class="bar-btn primary" id="addBtn">Añadir</button>
  <button class="bar-btn" id="importBtn">Importar</button>
  <button class="bar-btn" id="exportBtn">Exportar</button>
  <input type="file" id="importFile" accept="application/json,.json" hidden>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE_KEY = 'mi_cocteleria_v1';
const $ = s => document.querySelector(s);

const SEED = [
  {"id":"c-6mayo","name":"6 de mayo","category":"Con alcohol","favorite":false,"glass":"","tags":["mezcal","tequila","ahumado"],"ingredients":[{"q":"25 ml","n":"Mezcal"},{"q":"25 ml","n":"Tequila blanco"},{"q":"25 ml","n":"Sirope de pico de gallo / tomate"},{"q":"10 ml","n":"Lima"},{"q":"5 ml","n":"Mezcal con ñora (o 2 gotas de Tabasco)"},{"q":"Pizca","n":"Sal"},{"q":"10 ml","n":"Cointreau"}],"steps":[],"notes":""},
  {"id":"c-bloody-wednesday","name":"Bloody Wednesday","category":"Con alcohol","favorite":false,"glass":"","tags":["vodka","tomate"],"ingredients":[{"q":"45 ml","n":"Vodka"},{"q":"30 ml","n":"Zumo de limón"},{"q":"20 ml","n":"Sirope de tomate"},{"q":"","n":"Cilantro crudo"}],"steps":[],"notes":""},
  {"id":"c-cask-clover","name":"Cask & Clover","category":"Con alcohol","favorite":false,"glass":"","tags":["whiskey","bourbon","clara"],"ingredients":[{"q":"60 ml","n":"Whiskey (bourbon o irlandés suave)"},{"q":"25 ml","n":"Zumo de limón recién exprimido"},{"q":"20 ml","n":"Sirope simple (1:1 agua + azúcar)"},{"q":"1 ud","n":"Clara de huevo (o 20 ml de aquafaba para opción vegana)"}],"steps":[],"notes":""},
  {"id":"c-sargantana","name":"Sargantana","category":"Con alcohol","favorite":false,"glass":"","tags":["whiskey","sake"],"ingredients":[{"q":"30/40 ml","n":"Whiskey"},{"q":"20/30 ml","n":"Sake"},{"q":"5 ml","n":"Choya"},{"q":"100 ml","n":"Shiso"}],"steps":[],"notes":""},
  {"id":"c-lavender-collins","name":"Lavender Collins","category":"Con alcohol","favorite":false,"glass":"","tags":["gin","lavanda"],"ingredients":[{"q":"60 ml","n":"Gin"},{"q":"25 ml","n":"Sirope de lavanda"},{"q":"30 ml","n":"Zumo de limón"},{"q":"Top","n":"Agua con gas"}],"steps":[],"notes":""},
  {"id":"c-smoked-mandarino","name":"Smoked Mandarino","category":"Con alcohol","favorite":false,"glass":"","tags":["bourbon","jerez"],"ingredients":[{"q":"30 ml","n":"Bourbon"},{"q":"30 ml","n":"Gardeum"},{"q":"30 ml","n":"Jerez seco"}],"steps":[],"notes":""},
  {"id":"c-japanese-collins","name":"Japanese Collins","category":"Con alcohol","favorite":false,"glass":"","tags":["gin","japonés"],"ingredients":[{"q":"50 ml","n":"Gin japonesa"},{"q":"20/15 ml","n":"Zumo de lima"},{"q":"10 ml","n":"Choya con yuzu"},{"q":"10 ml","n":"Gardeum"},{"q":"Top","n":"Agua con gas"}],"steps":[],"notes":""},
  {"id":"c-el-rico","name":"El Rico","category":"Con alcohol","favorite":false,"glass":"","tags":["mezcal","picante"],"ingredients":[{"q":"50 ml","n":"Mezcal"},{"q":"20 ml","n":"Italicus"},{"q":"20 ml","n":"Choya con yuzu"},{"q":"15 ml","n":"Limón"},{"q":"1 flus","n":"Tabasco"},{"q":"0,5 ramas","n":"Cilantro"}],"steps":[],"notes":""},
  {"id":"c-macarronissimo","name":"Macarronissimo","category":"Con alcohol","favorite":false,"glass":"","tags":["gin","miso"],"ingredients":[{"q":"50 ml","n":"Gin Nut"},{"q":"50 ml","n":"Italicus"},{"q":"25 ml","n":"Limón"},{"q":"1/2 tbsp","n":"Caramelo de miso"},{"q":"1 ml","n":"Agua de bitxo"}],"steps":[],"notes":""},
  {"id":"c-june-17th","name":"June 17th","category":"Con alcohol","favorite":false,"glass":"","tags":["bourbon"],"ingredients":[{"q":"50 ml","n":"Bourbon"},{"q":"20 ml","n":"St. Germain"},{"q":"15 ml","n":"Italicus"}],"steps":[],"notes":""},
  {"id":"c-shiso-sirope","name":"Shiso (sirope)","category":"Siropes y prep.","favorite":false,"glass":"","tags":["sirope","shiso","preparación"],"ingredients":[{"q":"1 L","n":"Agua"},{"q":"100 g","n":"Azúcar"},{"q":"1,5 g","n":"Ácido cítrico"}],"steps":["Hervir el shiso en agua para extraer el color (el agua queda turbia/sucia).","Añadir el ácido cítrico para fijar y avivar el color."],"notes":"Base que uso en la Sargantana."},
  {"id":"c-sirope-jengibre","name":"Sirope de jengibre","category":"Siropes y prep.","favorite":false,"glass":"","tags":["sirope","jengibre","preparación"],"ingredients":[{"q":"100 ml","n":"Agua"},{"q":"100 g","n":"Azúcar"},{"q":"30-40 g","n":"Jengibre fresco rallado o en láminas"}],"steps":["Calentar el agua con el azúcar al fuego hasta disolver.","Añadir el jengibre y retirar del fuego.","Infusionar 10 min fuera del fuego.","Colar y guardar en bote en nevera (~2 semanas)."],"notes":""},
  {"id":"c-sirope-romero","name":"Sirope de romero","category":"Siropes y prep.","favorite":false,"glass":"","tags":["sirope","romero","preparación"],"ingredients":[{"q":"100 ml","n":"Agua"},{"q":"100 g","n":"Azúcar"},{"q":"2-3 ramas","n":"Romero"}],"steps":["Calentar el agua con el azúcar al fuego hasta disolver.","Añadir el romero y retirar del fuego.","Infusionar 10 min fuera del fuego.","Colar y guardar en bote en nevera (~2 semanas)."],"notes":""},
  {"id":"c-sirope-albahaca","name":"Sirope de albahaca","category":"Siropes y prep.","favorite":false,"glass":"","tags":["sirope","albahaca","preparación"],"ingredients":[{"q":"100 ml","n":"Agua"},{"q":"100 g","n":"Azúcar"},{"q":"12-15 hojas","n":"Albahaca"}],"steps":["Calentar el agua con el azúcar al fuego hasta disolver.","Añadir la albahaca y retirar del fuego.","Infusionar 10 min fuera del fuego.","Colar y guardar en bote en nevera (~2 semanas)."],"notes":""},
  {"id":"c-sirope-miel-jengibre","name":"Sirope de miel y jengibre","category":"Siropes y prep.","favorite":false,"glass":"","tags":["sirope","miel","jengibre","preparación"],"ingredients":[{"q":"100 ml","n":"Agua"},{"q":"100 g","n":"Miel"},{"q":"30 g","n":"Jengibre"}],"steps":["Calentar el agua con la miel hasta disolver.","Añadir el jengibre y retirar del fuego.","Infusionar 10 min fuera del fuego.","Colar y guardar en bote en nevera (~2 semanas)."],"notes":"El clásico para el Penicillin."},
  {"id":"c-sirope-agave","name":"Sirope de agave","category":"Siropes y prep.","favorite":false,"glass":"","tags":["sirope","agave","preparación"],"ingredients":[{"q":"2 partes","n":"Agave"},{"q":"1 parte","n":"Agua tibia"}],"steps":["Mezclar el agave con el agua tibia y remover hasta integrar.","No necesita cocción. Guardar en bote en nevera (~2 semanas)."],"notes":"El más rápido: no hay que cocinar."},
  {"id":"c-penicillin-sobrio","name":"Penicillin sobrio","category":"Sin alcohol","favorite":false,"glass":"Vaso largo","tags":["sin alcohol","ahumado","té"],"ingredients":[{"q":"25 ml","n":"Limón"},{"q":"20 ml","n":"Sirope de miel y jengibre"},{"q":"100 ml","n":"Té lapsang souchong frío y cargado"},{"q":"3 gotas","n":"Angostura"}],"steps":["Construir en el vaso sobre hielo.","Remover."],"notes":"El \"whisky de mentira\": el más ahumado y maderoso."},
  {"id":"c-mule-sobrio","name":"Mule sobrio","category":"Sin alcohol","favorite":false,"glass":"Vaso largo","tags":["sin alcohol","jengibre"],"ingredients":[{"q":"25 ml","n":"Lima"},{"q":"20 ml","n":"Sirope de jengibre"},{"q":"100 ml","n":"Soda (o ginger ale si lo quieres más dulce y picante)"},{"q":"3 gotas","n":"Angostura"}],"steps":["Construir en el vaso sobre hielo.","Remover."],"notes":""},
  {"id":"c-romero-miel","name":"Romero-miel","category":"Sin alcohol","favorite":false,"glass":"Vaso largo","tags":["sin alcohol","romero"],"ingredients":[{"q":"25 ml","n":"Limón"},{"q":"15 ml","n":"Sirope de romero"},{"q":"1 cdta","n":"Miel"},{"q":"100 ml","n":"Tónica"},{"q":"3 gotas","n":"Angostura"}],"steps":["Construir en el vaso sobre hielo.","Remover."],"notes":""},
  {"id":"c-albahaca-lima","name":"Albahaca-lima","category":"Sin alcohol","favorite":false,"glass":"Vaso largo","tags":["sin alcohol","albahaca"],"ingredients":[{"q":"25 ml","n":"Lima"},{"q":"20 ml","n":"Sirope de albahaca"},{"q":"4-5 hojas","n":"Albahaca majada en el vaso"},{"q":"90 ml","n":"Soda"},{"q":"2 gotas","n":"Angostura"}],"steps":["Majar la albahaca en el vaso.","Añadir el resto sobre hielo y remover."],"notes":""},
  {"id":"c-jengibre-albahaca","name":"Jengibre-albahaca","category":"Sin alcohol","favorite":false,"glass":"Vaso largo","tags":["sin alcohol","jengibre","albahaca"],"ingredients":[{"q":"25 ml","n":"Lima"},{"q":"20 ml","n":"Sirope de jengibre"},{"q":"4 hojas","n":"Albahaca majada"},{"q":"90 ml","n":"Soda"}],"steps":["Majar la albahaca en el vaso.","Añadir el resto sobre hielo y remover."],"notes":""},
  {"id":"c-agave-neutro","name":"Agave neutro","category":"Sin alcohol","favorite":false,"glass":"Vaso largo","tags":["sin alcohol","margarita"],"ingredients":[{"q":"30 ml","n":"Lima"},{"q":"20 ml","n":"Agave"},{"q":"90 ml","n":"Soda"},{"q":"4-5 gotas","n":"Angostura"}],"steps":["Construir en el vaso sobre hielo.","Remover."],"notes":"El más limpio, tipo Margarita sobria. Aquí el amargor de la Angostura es el protagonista."},
  {"id":"c-sour-aquafaba","name":"Sour de aquafaba","category":"Sin alcohol","favorite":false,"glass":"Copa","tags":["sin alcohol","sour","espuma"],"ingredients":[{"q":"30 ml","n":"Limón"},{"q":"25 ml","n":"Sirope de miel y jengibre"},{"q":"15 ml","n":"Aquafaba (agua del bote de garbanzos)"},{"q":"3 gotas","n":"Angostura (al final, por encima)"}],"steps":["Agitar fuerte SIN hielo 15 seg para montar la espuma.","Agitar de nuevo CON hielo otros 15 seg.","Colar en copa.","Las gotas de Angostura van sobre la espuma."],"notes":"Textura de Whiskey Sour real."},
  {"id":"c-lapsang-puro","name":"Lapsang puro","category":"Sin alcohol","favorite":false,"glass":"Vaso largo","tags":["sin alcohol","té","ahumado"],"ingredients":[{"q":"120 ml","n":"Té lapsang souchong frío y cargado"},{"q":"20 ml","n":"Sirope de jengibre"},{"q":"3 gotas","n":"Angostura"},{"q":"10 ml","n":"Limón (opcional, para más vivo)"}],"steps":["Construir sobre hielo.","Remover."],"notes":"El más maderoso, sin cítrico."}
];

let data = load();
let filter = 'Todos';
let query = '';

function load(){
  try{ const raw = localStorage.getItem(STORE_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  localStorage.setItem(STORE_KEY, JSON.stringify(SEED));
  return JSON.parse(JSON.stringify(SEED));
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
function uid(){ return 'c-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function categories(){
  const set = new Set(data.map(c=>c.category).filter(Boolean));
  return ['Todos','Favoritos', ...[...set].sort()];
}

function star(filled){
  return `<svg class="star" width="20" height="20" viewBox="0 0 24 24" fill="${filled?'var(--accent2)':'none'}" stroke="${filled?'var(--accent2)':'var(--soft)'}" stroke-width="1.5" stroke-linejoin="round"><path d="M12 3.2l2.6 5.5 6 .7-4.4 4.1 1.1 5.9L12 16.6 6.7 19.4l1.1-5.9L3.4 9.4l6-.7z"/></svg>`;
}

function render(){
  $('#count').textContent = data.length ? data.length + (data.length===1?' receta':' recetas') : '';
  const sel = $('#catFilter');
  sel.innerHTML = categories().map(c=>`<option value="${esc(c)}"${c===filter?' selected':''}>${esc(c)}</option>`).join('');

  let list = data.slice();
  if(filter==='Favoritos') list = list.filter(c=>c.favorite);
  else if(filter!=='Todos') list = list.filter(c=>c.category===filter);
  if(query){
    const q = query.toLowerCase();
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) ||
      (c.ingredients||[]).some(i=>i.n.toLowerCase().includes(q)) ||
      (c.tags||[]).some(t=>t.toLowerCase().includes(q))
    );
  }
  list.sort((a,b)=> (b.favorite?1:0)-(a.favorite?1:0) || a.name.localeCompare(b.name));

  const grid = $('#grid'); grid.innerHTML='';
  if(!list.length){
    grid.innerHTML = `<div class="empty"><div class="line"></div>${data.length? 'No hay resultados para esta búsqueda.' : 'Aún no hay recetas.<br>Pulsa «Añadir» para crear la primera.'}</div>`;
    return;
  }
  list.forEach(c=>{
    const el = document.createElement('div');
    el.className='card';
    const ings = (c.ingredients||[]).map(i=>i.n).slice(0,5).join(' · ');
    el.innerHTML = `
      <div class="top">
        <h3>${esc(c.name)}</h3>
        ${star(c.favorite)}
      </div>
      ${c.category?`<span class="cat">${esc(c.category)}</span>`:''}
      ${ings?`<p class="ing">${esc(ings)}</p>`:''}
      ${(c.tags||[]).length?`<div class="tags">${c.tags.slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
    `;
    el.onclick = ()=>showDetail(c.id);
    grid.appendChild(el);
  });
}

function showDetail(id){
  const c = data.find(x=>x.id===id); if(!c) return;
  $('#sheet').innerHTML = `
    <div class="grip"></div>
    <div class="d-head">
      <h2>${esc(c.name)}</h2>
      <span id="favToggle">${star(c.favorite)}</span>
    </div>
    ${c.category?`<p class="d-cat">${esc(c.category)}${c.glass?` &nbsp;·&nbsp; ${esc(c.glass)}`:''}</p>`:''}
    ${(c.tags||[]).length?`<div class="detail-tags">${c.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
    ${(c.ingredients||[]).length?`
      <div class="section-t">Ingredientes</div>
      <ul class="ing-list">${c.ingredients.map(i=>`<li><span>${esc(i.n)}</span><span class="q">${esc(i.q||'')}</span></li>`).join('')}</ul>`:''}
    ${(c.steps||[]).length?`
      <div class="section-t">Elaboración</div>
      <ol class="steps">${c.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`:''}
    ${c.notes?`<div class="section-t">Notas</div><div class="notes">${esc(c.notes)}</div>`:''}
    <div class="detail-actions">
      <button class="btn" id="editBtn">Editar</button>
      <button class="btn danger" id="delBtn">Eliminar</button>
    </div>
  `;
  openOverlay();
  $('#favToggle').onclick = ()=>{ c.favorite=!c.favorite; save(); $('#favToggle').innerHTML=star(c.favorite); render(); };
  $('#editBtn').onclick = ()=>showForm(c.id);
  $('#delBtn').onclick = ()=>{
    if(confirm(`¿Eliminar "${c.name}"?`)){ data = data.filter(x=>x.id!==id); save(); closeOverlay(); render(); toast('Receta eliminada'); }
  };
}

function showForm(id){
  const c = id ? data.find(x=>x.id===id) : null;
  const ingText = c ? (c.ingredients||[]).map(i=>`${i.q||''} ${i.n}`.trim()).join('\n') : '';
  const stepText = c ? (c.steps||[]).join('\n') : '';
  $('#sheet').innerHTML = `
    <div class="grip"></div>
    <h2>${c?'Editar receta':'Nueva receta'}</h2>
    <div style="height:18px"></div>
    <div class="field"><label>Nombre</label><input id="f_name" value="${c?esc(c.name):''}" placeholder="Ej. Margarita"></div>
    <div class="row2">
      <div class="field"><label>Categoría</label><input id="f_cat" value="${c?esc(c.category||''):''}" placeholder="Con alcohol…" list="catlist"></div>
      <div class="field"><label>Cristalería</label><input id="f_glass" value="${c?esc(c.glass||''):''}" placeholder="Copa, Vaso largo…"></div>
    </div>
    <datalist id="catlist">${[...new Set(data.map(x=>x.category).filter(Boolean))].map(x=>`<option value="${esc(x)}">`).join('')}</datalist>
    <div class="field"><label>Etiquetas</label><input id="f_tags" value="${c?esc((c.tags||[]).join(', ')):''}" placeholder="cítrico, ron, batido"><div class="hint">Separadas por comas.</div></div>
    <div class="field"><label>Ingredientes</label><textarea id="f_ing" placeholder="60 ml Ron blanco&#10;25 ml Zumo de lima">${esc(ingText)}</textarea><div class="hint">Uno por línea: cantidad + ingrediente.</div></div>
    <div class="field"><label>Elaboración</label><textarea id="f_steps" placeholder="Un paso por línea">${esc(stepText)}</textarea><div class="hint">Un paso por línea.</div></div>
    <div class="field"><label>Notas</label><textarea id="f_notes" placeholder="Trucos, variaciones…">${c?esc(c.notes||''):''}</textarea></div>
    <div class="detail-actions">
      <button class="btn" id="cancelBtn">Cancelar</button>
      <button class="btn primary" id="saveBtn">Guardar</button>
    </div>
  `;
  openOverlay();
  $('#cancelBtn').onclick = ()=> c ? showDetail(c.id) : closeOverlay();
  $('#saveBtn').onclick = ()=>{
    const name = $('#f_name').value.trim();
    if(!name){ toast('Ponle un nombre'); $('#f_name').focus(); return; }
    const ingredients = $('#f_ing').value.split('\n').map(l=>l.trim()).filter(Boolean).map(parseIng);
    const steps = $('#f_steps').value.split('\n').map(l=>l.trim()).filter(Boolean);
    const tags = $('#f_tags').value.split(',').map(t=>t.trim()).filter(Boolean);
    const obj = {
      id: c?c.id:uid(), name, category:$('#f_cat').value.trim(), glass:$('#f_glass').value.trim(),
      tags, ingredients, steps, notes:$('#f_notes').value.trim(), favorite: c?c.favorite:false
    };
    if(c){ Object.assign(c,obj); } else { data.push(obj); }
    save(); render(); showDetail(obj.id); toast(c?'Cambios guardados':'Receta añadida');
  };
  setTimeout(()=>$('#f_name').focus(),100);
}

function parseIng(line){
  const m = line.match(/^([\d.,/]+\s*(?:ml|cl|oz|g|gr|dash|dashes|gotas?|cucharada?s?|cdta?|chorr[io]t?o?|partes?|barspoon|bs|piezas?|unidad(?:es)?|ramita?s?|hojas?)?\.?)\s+(.+)$/i);
  if(m && m[2]) return {q:m[1].trim(), n:m[2].trim()};
  return {q:'', n:line};
}

function openOverlay(){ $('#overlay').classList.add('open'); document.body.style.overflow='hidden'; }
function closeOverlay(){ $('#overlay').classList.remove('open'); document.body.style.overflow=''; }
$('#overlay').onclick = e=>{ if(e.target===$('#overlay')) closeOverlay(); };

$('#addBtn').onclick = ()=>showForm(null);
$('#search').oninput = e=>{ query=e.target.value; render(); };
$('#catFilter').onchange = e=>{ filter=e.target.value; render(); };

$('#exportBtn').onclick = ()=>{
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); const d = new Date();
  a.href = url;
  a.download = `cocteles-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('Exportado. Guárdalo en iCloud');
};
$('#importBtn').onclick = ()=>$('#importFile').click();
$('#importFile').onchange = e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const incoming = JSON.parse(ev.target.result);
      if(!Array.isArray(incoming)) throw new Error('formato');
      const byId = {}; data.forEach(c=>byId[c.id]=c);
      let added=0, updated=0;
      incoming.forEach(c=>{
        if(!c || !c.name) return;
        if(!c.id) c.id = uid();
        if(byId[c.id]){ Object.assign(byId[c.id],c); updated++; }
        else { data.push(c); byId[c.id]=c; added++; }
      });
      save(); render();
      toast(`Importado: ${added} nuevas, ${updated} actualizadas`);
    }catch(err){ toast('No pude leer ese archivo'); }
  };
  reader.readAsText(file); e.target.value='';
};

let toastT;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

render();
</script>
</body>
</html>
