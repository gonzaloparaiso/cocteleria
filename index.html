<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coctelería">
<meta name="theme-color" content="#1a0c0c">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<title>Coctelería</title>
<style>
  :root{
    --bg:#1a0c0c; --bg2:#241010; --card:#2c1413; --card2:#371917;
    --line:#48201e; --text:#f2e4e0; --muted:#b89089; --soft:#8f6a64;
    --accent:#b23a32; --accent2:#d4564a; --gold:#c98b5e; --shadow:rgba(0,0,0,.55);
    --serif:'Cormorant Garamond',Georgia,'Times New Roman',serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:linear-gradient(180deg,#1a0c0c,#100707);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:760px;margin:0 auto;padding:26px 18px 110px}

  /* Header */
  header{display:flex;align-items:center;gap:12px;padding-bottom:16px;border-bottom:1px solid var(--line);margin-bottom:18px}
  header .hamb{flex:0 0 auto;position:relative;background:none;border:none;color:var(--text);cursor:pointer;padding:6px;margin-left:-6px;display:flex}
  header .hamb svg{width:24px;height:24px;display:block}
  header .hamb .dot{position:absolute;top:3px;right:3px;width:7px;height:7px;border-radius:50%;background:var(--accent2);display:none}
  header .hamb.active .dot{display:block}
  header .brand-logo{width:46px;height:46px;display:block}
  header .brand-sub{color:var(--soft);font-size:.7rem;letter-spacing:2.5px;text-transform:uppercase}

  /* Toolbar: search + filter */
  .toolbar{display:flex;gap:10px;margin-bottom:18px}
  .search{flex:1;position:relative}
  .search input{
    width:100%;padding:12px 14px 12px 40px;border-radius:3px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:1rem;outline:none;
  }
  .search input:focus{border-color:var(--accent)}
  .search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--soft)}
  .selectwrap{position:relative;flex:0 0 auto}
  .selectwrap select{
    appearance:none;-webkit-appearance:none;height:100%;
    padding:12px 36px 12px 15px;border-radius:10px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:.92rem;font-weight:600;outline:none;cursor:pointer;
  }
  .selectwrap select:focus{border-color:var(--accent)}
  .selectwrap::after{
    content:"";position:absolute;right:14px;top:50%;width:7px;height:7px;border-right:2px solid var(--muted);
    border-bottom:2px solid var(--muted);transform:translateY(-65%) rotate(45deg);pointer-events:none;
  }

  .count{color:var(--soft);font-size:.74rem;letter-spacing:1.5px;text-transform:uppercase;margin:0 2px 14px}

  /* Cards */
  .grid{display:grid;gap:9px}
  .card{
    position:relative;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);
    border-radius:2px;padding:15px 16px 15px 17px;cursor:pointer;transition:background .15s,border-color .15s;
  }
  .card:active{background:var(--card2)}
  .card.t-sin{border-left-color:var(--gold)}
  .card.t-prep{border-left-color:var(--soft)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .card h3{margin:0;font-family:var(--serif);font-size:1.55rem;font-weight:300;letter-spacing:.3px;line-height:1.05}
  .card .star{flex-shrink:0;margin-top:3px}
  .card .meta{margin-top:5px;font-size:.65rem;letter-spacing:1.4px;text-transform:uppercase;color:var(--accent2);font-weight:700}
  .card .meta .base{color:var(--gold)}
  .card p.ing{margin:9px 0 0;color:var(--muted);font-size:.86rem;line-height:1.42}
  .tag{font-size:.7rem;letter-spacing:.5px;padding:3px 9px;border-radius:2px;background:rgba(178,58,50,.12);color:var(--gold);border:1px solid rgba(178,58,50,.28)}

  .empty{text-align:center;color:var(--soft);padding:70px 24px;font-size:.95rem;line-height:1.6}
  .empty .line{width:40px;height:1px;background:var(--line);margin:0 auto 18px}

  /* Drawer / filtros */
  .scrim{position:fixed;inset:0;background:rgba(8,4,4,.6);backdrop-filter:blur(3px);z-index:40;opacity:0;pointer-events:none;transition:.25s}
  .scrim.open{opacity:1;pointer-events:auto}
  .drawer{
    position:fixed;top:0;left:0;bottom:0;width:300px;max-width:84vw;z-index:45;background:var(--bg2);border-right:1px solid var(--line);
    transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:6px 0 34px var(--shadow);
    padding:calc(22px + env(safe-area-inset-top)) 22px calc(24px + env(safe-area-inset-bottom));
  }
  .drawer.open{transform:none}
  .drawer-head{display:flex;justify-content:space-between;align-items:center}
  .drawer-head span{font-family:var(--serif);font-size:1.7rem;font-weight:300}
  .drawer-head button{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex}
  .fgroup{margin-top:22px}
  .fgroup-t{color:var(--gold);font-size:.68rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:10px}
  .fchips{display:flex;flex-wrap:wrap;gap:7px}
  .fchip{padding:7px 12px;border-radius:3px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:.82rem;cursor:pointer;transition:.15s}
  .fchip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .drawer-clear{margin-top:28px;width:100%;padding:12px;border-radius:3px;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:.72rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer}

  /* Bottom bar */
  .bottombar{
    position:fixed;left:0;right:0;bottom:0;z-index:25;display:flex;
    justify-content:space-around;align-items:center;pointer-events:none;
    background:linear-gradient(0deg,#120707 60%,rgba(18,7,7,.82) 82%,rgba(18,7,7,0));
    padding:20px 30px calc(14px + env(safe-area-inset-bottom));max-width:760px;margin:0 auto;
  }
  .bar-btn{
    flex:0 0 auto;background:none;border:none;color:var(--soft);cursor:pointer;transition:.18s;
    display:flex;align-items:center;justify-content:center;padding:8px;pointer-events:auto;
  }
  .bar-btn svg{width:26px;height:26px;display:block}
  .bar-btn:active{transform:scale(.85)}
  .bar-btn.primary{color:var(--accent2)}
  .bar-btn.primary svg{width:30px;height:30px}
  .bar-btn.accent{color:var(--gold)}

  /* Assistant */
  .ai-modes{display:flex;gap:6px;flex-wrap:wrap;margin:16px 0 18px}
  .ai-mode{flex:1 1 auto;padding:10px 8px;border-radius:3px;border:1px solid var(--line);background:var(--card);color:var(--muted);font-size:.78rem;font-weight:600;cursor:pointer;text-align:center;white-space:nowrap}
  .ai-mode.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .ai-hint{color:var(--soft);font-size:.82rem;line-height:1.45;margin:0 0 14px}
  .ai-key{background:var(--card);border:1px solid var(--line);border-radius:3px;padding:14px;margin-bottom:16px}
  .ai-key .lbl{font-size:.72rem;color:var(--muted);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .ai-keyrow{display:flex;gap:8px}
  .ai-keyrow input{flex:1;padding:10px 12px;border-radius:3px;border:1px solid var(--line);background:var(--bg2);color:var(--text);font-size:.9rem;outline:none}
  .ai-keysmall{font-size:.74rem;color:var(--soft);margin-top:8px}
  .ai-keysmall a{color:var(--gold)}
  .ai-saved{display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--soft);margin-bottom:14px}
  .ai-saved a{color:var(--gold);cursor:pointer}
  .ai-results{margin-top:6px}
  .ai-msg{color:var(--text);font-size:1.05rem;line-height:1.5;font-family:var(--serif);font-weight:400;margin:4px 0 18px}
  .ai-rec{background:var(--card);border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:2px;padding:16px;margin-bottom:14px}
  .ai-rec h4{margin:0 0 4px;font-family:var(--serif);font-size:1.45rem;font-weight:300}
  .ai-rec .rc{color:var(--accent2);font-size:.66rem;letter-spacing:1.6px;text-transform:uppercase;font-weight:700}
  .ai-rec ul{list-style:none;padding:0;margin:12px 0 0}
  .ai-rec ul li{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid rgba(72,32,30,.4);font-size:.9rem}
  .ai-rec ul li:last-child{border-bottom:none}
  .ai-rec ul li .q{color:var(--gold);font-weight:600;white-space:nowrap}
  .ai-rec ol{margin:12px 0 0;padding-left:18px;font-size:.9rem;line-height:1.5;color:var(--muted)}
  .ai-rec .nt{margin:12px 0 0;font-style:italic;color:var(--soft);font-size:.86rem;font-family:var(--serif)}
  .ai-rec .save{margin-top:14px;width:100%;padding:11px;border-radius:2px;border:1px solid var(--accent);background:transparent;color:var(--accent2);font-size:.74rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer}
  .ai-rec .save.done{background:var(--card2);color:var(--soft);border-color:var(--line)}
  .spinner{width:26px;height:26px;border:2.5px solid var(--line);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite;margin:30px auto}
  @keyframes spin{to{transform:rotate(360deg)}}
  .ai-err{background:rgba(178,58,50,.12);border:1px solid rgba(178,58,50,.4);color:#e8a08f;padding:12px 14px;border-radius:3px;font-size:.85rem;line-height:1.45;margin-top:10px}

  /* Overlay / sheet */
  .overlay{position:fixed;inset:0;background:rgba(8,4,4,.72);backdrop-filter:blur(4px);z-index:50;display:none;align-items:flex-end;justify-content:center}
  .overlay.open{display:flex}
  .sheet{
    background:var(--bg2);width:100%;max-width:680px;max-height:92vh;overflow-y:auto;
    border-radius:5px 5px 0 0;border:1px solid var(--line);border-bottom:none;
    padding:10px 22px calc(28px + env(safe-area-inset-bottom));animation:up .25s ease;
  }
  @media(min-width:700px){.overlay{align-items:center}.sheet{border-radius:5px;border-bottom:1px solid var(--line);max-height:88vh}}
  @keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:translateY(0);opacity:1}}
  .grip{width:40px;height:4px;background:var(--line);border-radius:3px;margin:8px auto 18px}
  .sheet .d-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .sheet h2{margin:0;font-family:var(--serif);font-size:2.1rem;font-weight:300;letter-spacing:.4px;line-height:1.1}
  .d-cat{color:var(--accent2);font-size:.7rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin:14px 0 0}
  .detail-tags{display:flex;gap:7px;flex-wrap:wrap;margin:14px 0 4px}
  .section-t{color:var(--gold);font-size:.72rem;text-transform:uppercase;letter-spacing:2px;margin:24px 0 12px;font-weight:700;padding-bottom:7px;border-bottom:1px solid var(--line)}
  .ing-list{list-style:none;padding:0;margin:0}
  .ing-list li{padding:9px 0;border-bottom:1px solid rgba(72,32,30,.5);display:flex;justify-content:space-between;gap:12px;font-size:.96rem}
  .ing-list li:last-child{border-bottom:none}
  .ing-list li .q{color:var(--gold);font-variant-numeric:tabular-nums;white-space:nowrap;font-weight:600}
  .steps{padding-left:0;margin:0;list-style:none;counter-reset:s}
  .steps li{position:relative;padding:4px 0 16px 38px;font-size:.96rem;line-height:1.5;counter-increment:s}
  .steps li:last-child{padding-bottom:0}
  .steps li::before{
    content:counter(s);position:absolute;left:0;top:2px;width:26px;height:26px;border-radius:2px;
    border:1px solid var(--accent);color:var(--accent2);font-weight:500;font-size:.92rem;
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);
  }
  .notes{color:var(--muted);font-size:1.02rem;line-height:1.5;font-style:italic;font-family:var(--serif);font-weight:400}
  .detail-actions{display:flex;gap:10px;margin-top:28px}
  .btn{flex:1;padding:13px;border-radius:2px;border:1px solid var(--line);font-size:.78rem;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;background:var(--card);color:var(--text)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.danger{flex:0 0 auto;padding:13px 18px;background:transparent;color:var(--accent2);border-color:rgba(178,58,50,.45)}
  .star{cursor:pointer}

  /* Form */
  .field{margin-bottom:15px}
  .field label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:7px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
  .field input,.field textarea{
    width:100%;padding:11px 13px;border-radius:3px;border:1px solid var(--line);
    background:var(--card);color:var(--text);font-size:1rem;outline:none;font-family:inherit;
  }
  .field input:focus,.field textarea:focus{border-color:var(--accent)}
  .field textarea{resize:vertical;min-height:74px;line-height:1.45}
  .field .hint{font-size:.72rem;color:var(--soft);margin-top:6px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  .toast{
    position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);
    background:var(--card2);border:1px solid var(--accent);color:var(--text);
    padding:11px 22px;border-radius:3px;font-size:.86rem;z-index:80;opacity:0;transition:.25s;pointer-events:none;box-shadow:0 8px 22px var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <button class="hamb" id="menuBtn" aria-label="Filtros">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      <span class="dot"></span>
    </button>
    <img class="brand-logo" src="logo.png" alt="Coctelería" width="46" height="46">
    <span class="brand-sub">Carta personal</span>
  </header>

  <div class="toolbar">
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="Buscar cóctel o ingrediente" autocomplete="off">
    </div>
  </div>

  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
</div>

<div class="bottombar">
  <button class="bar-btn primary" id="addBtn" aria-label="Añadir" title="Añadir cóctel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>
  <button class="bar-btn accent" id="aiBtn" aria-label="Asistente" title="Asistente IA">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3l1.7 5.3L19 10l-5.3 1.7L12 17l-1.7-5.3L5 10l5.3-1.7z"/><path d="M18.5 14.5l.6 1.9 1.9.6-1.9.6-.6 1.9-.6-1.9L16 17l1.9-.6z"/></svg>
  </button>
  <button class="bar-btn" id="mapBtn" aria-label="Coctelerías en el mapa" title="Coctelerías (Google Maps)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-6-5.4-6-10a6 6 0 0 1 12 0c0 4.6-6 10-6 10z"/><circle cx="12" cy="11" r="2.3"/></svg>
  </button>
  <button class="bar-btn" id="importBtn" aria-label="Importar" title="Importar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4"/><path d="m7 9 5-5 5 5"/><path d="M5 19h14"/></svg>
  </button>
  <button class="bar-btn" id="exportBtn" aria-label="Exportar" title="Exportar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11"/><path d="m7 10 5 5 5-5"/><path d="M5 19h14"/></svg>
  </button>
  <input type="file" id="importFile" accept="application/json,.json" hidden>
</div>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<div class="toast" id="toast"></div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer" aria-hidden="true">
  <div class="drawer-head">
    <span>Filtros</span>
    <button id="drawerClose" aria-label="Cerrar"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
  </div>
  <div id="filterBody"></div>
  <button class="drawer-clear" id="clearFilters">Limpiar filtros</button>
</aside>

<script>

let data = load();
let query = '';
const fTipo = new Set(), fAlc = new Set(), fNotas = new Set();
let favOnly = false;
const SPIRITS = new Set(['mezcal','tequila','vodka','whiskey','whisky','bourbon','gin','sake','jerez','ron','agave']);
const EXCL_NOTAS = new Set(['sin alcohol','preparación','sirope','shiso','clara','sour','espuma','japonés','margarita','con hielo','aperitivo','batido']);

function load(){
  try{ const raw = localStorage.getItem(STORE_KEY); if(raw) return JSON.parse(raw); }catch(e){}
  localStorage.setItem(STORE_KEY, JSON.stringify(SEED));
  return JSON.parse(JSON.stringify(SEED));
}
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(data)); }
function uid(){ return 'c-' + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function filterOptions(){
  const tipos=new Set(), alc=new Set(), notas=new Set();
  data.forEach(c=>{
    if(c.category) tipos.add(c.category);
    (c.tags||[]).forEach(t=>{
      const tl=t.toLowerCase();
      if(SPIRITS.has(tl)) alc.add(tl);
      else if(!EXCL_NOTAS.has(tl)) notas.add(tl);
    });
  });
  return {tipos:[...tipos].sort(), alc:[...alc].sort(), notas:[...notas].sort()};
}
function filtersActive(){ return favOnly || fTipo.size || fAlc.size || fNotas.size; }
function renderFilters(){
  const {tipos,alc,notas}=filterOptions();
  const grp=(title,items,set)=> items.length?`<div class="fgroup"><div class="fgroup-t">${esc(title)}</div><div class="fchips">${
    items.map(it=>`<button class="fchip${set.has(it)?' on':''}" data-grp="${esc(title)}" data-val="${esc(it)}">${esc(it)}</button>`).join('')}</div></div>`:'';
  let html=`<div class="fgroup"><div class="fchips"><button class="fchip${favOnly?' on':''}" data-fav="1">★ Favoritos</button></div></div>`;
  html+=grp('Tipo',tipos,fTipo)+grp('Alcohol',alc,fAlc)+grp('Notas de sabor',notas,fNotas);
  $('#filterBody').innerHTML=html;
  $('#filterBody').querySelectorAll('.fchip').forEach(b=>{
    b.onclick=()=>{
      if(b.dataset.fav){ favOnly=!favOnly; }
      else{
        const g=b.dataset.grp, v=b.dataset.val;
        const set = g==='Tipo'?fTipo : g==='Alcohol'?fAlc : fNotas;
        set.has(v)?set.delete(v):set.add(v);
      }
      renderFilters(); render();
    };
  });
}

function star(filled){
  return `<svg class="star" width="20" height="20" viewBox="0 0 24 24" fill="${filled?'var(--accent2)':'none'}" stroke="${filled?'var(--accent2)':'var(--soft)'}" stroke-width="1.5" stroke-linejoin="round"><path d="M12 3.2l2.6 5.5 6 .7-4.4 4.1 1.1 5.9L12 16.6 6.7 19.4l1.1-5.9L3.4 9.4l6-.7z"/></svg>`;
}

function render(){
  const menu=$('#menuBtn'); if(menu) menu.classList.toggle('active', !!filtersActive());

  let list = data.slice();
  if(favOnly) list = list.filter(c=>c.favorite);
  if(fTipo.size) list = list.filter(c=>fTipo.has(c.category));
  if(fAlc.size) list = list.filter(c=>(c.tags||[]).some(t=>fAlc.has(t.toLowerCase())));
  if(fNotas.size) list = list.filter(c=>(c.tags||[]).some(t=>fNotas.has(t.toLowerCase())));
  if(query){
    const q = query.toLowerCase();
    list = list.filter(c =>
      c.name.toLowerCase().includes(q) ||
      (c.ingredients||[]).some(i=>i.n.toLowerCase().includes(q)) ||
      (c.tags||[]).some(t=>t.toLowerCase().includes(q))
    );
  }
  list.sort((a,b)=> (b.favorite?1:0)-(a.favorite?1:0) || a.name.localeCompare(b.name));
  $('#count').textContent = list.length + (list.length===1?' receta':' recetas');

  const grid = $('#grid'); grid.innerHTML='';
  if(!list.length){
    grid.innerHTML = `<div class="empty"><div class="line"></div>${data.length? 'No hay resultados con estos filtros.' : 'Aún no hay recetas.<br>Pulsa «Añadir» para crear la primera.'}</div>`;
    return;
  }
  list.forEach(c=>{
    const el = document.createElement('div');
    const tc = c.category==='Sin alcohol' ? ' t-sin' : (c.category && c.category.toLowerCase().startsWith('sirope') ? ' t-prep' : '');
    el.className='card'+tc;
    const ings = (c.ingredients||[]).map(i=>i.n).slice(0,5).join(' · ');
    const bases = (c.tags||[]).filter(t=>SPIRITS.has(t.toLowerCase()));
    let metaHtml = esc(c.category||'');
    if(bases.length) metaHtml += `${c.category?' · ':''}<span class="base">${bases.map(esc).join(' · ')}</span>`;
    el.innerHTML = `
      <div class="top"><h3>${esc(c.name)}</h3>${star(c.favorite)}</div>
      ${(c.category||bases.length)?`<div class="meta">${metaHtml}</div>`:''}
      ${ings?`<p class="ing">${esc(ings)}</p>`:''}
    `;
    el.onclick = ()=>showDetail(c.id);
    grid.appendChild(el);
  });
}

function showDetail(id){

  $('#sheet').innerHTML = `
    <div class="grip"></div>
    <div class="d-head">
      <h2>${esc(c.name)}</h2>
      <span id="favToggle">${star(c.favorite)}</span>

    ${c.category?`<p class="d-cat">${esc(c.category)}${c.glass?` &nbsp;·&nbsp; ${esc(c.glass)}`:''}</p>`:''}
    ${(c.tags||[]).length?`<div class="detail-tags">${c.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
    ${(c.ingredients||[]).length?`
      <div class="section-t">Ingredientes</div>
      <ul class="ing-list">${c.ingredients.map(i=>`<li><span>${esc(i.n)}</span><span class="q">${esc(i.q||'')}</span></li>`).join('')}</ul>`:''}

    </div>
  `;

}

function showForm(id){
  const c = id ? data.find(x=>x.id===id) : null;
  const ingText = c ? (c.ingredients||[]).map(i=>`${i.q||''} ${i.n}`.trim()).join('\n') : '';
  const stepText = c ? (c.steps||[]).join('\n') : '';
  $('#sheet').innerHTML = `

    <div class="field"><label>Ingredientes</label><textarea id="f_ing" placeholder="60 ml Ron blanco&#10;25 ml Zumo de lima">${esc(ingText)}</textarea><div class="hint">Uno por línea: cantidad + ingrediente.</div></div>
    <div class="field"><label>Elaboración</label><textarea id="f_steps" placeholder="Un paso por línea">${esc(stepText)}</textarea><div class="hint">Un paso por línea.</div></div>

    <div class="detail-actions">
      <button class="btn" id="cancelBtn">Cancelar</button>
      <button class="btn primary" id="saveBtn">Guardar</button>
    </div>
  `;
  openOverlay();
  $('#cancelBtn').onclick = ()=> c ? showDetail(c.id) : closeOverlay();
  $('#saveBtn').onclick = ()=>{
    const name = $('#f_name').value.trim();
    if(!name){ toast('Ponle un nombre'); $('#f_name').focus(); return; }
    const ingredients = $('#f_ing').value.split('\n').map(l=>l.trim()).filter(Boolean).map(parseIng);
    const steps = $('#f_steps').value.split('\n').map(l=>l.trim()).filter(Boolean);
    const tags = $('#f_tags').value.split(',').map(t=>t.trim()).filter(Boolean);
    const obj = {
      id: c?c.id:uid(), name, category:$('#f_cat').value.trim(), glass:$('#f_glass').value.trim(),
      tags, ingredients, steps, notes:$('#f_notes').value.trim(), favorite: c?c.favorite:false
    };
    if(c){ Object.assign(c,obj); } else { data.push(obj); }
    save(); render(); showDetail(obj.id); toast(c?'Cambios guardados':'Receta añadida');
  };
  setTimeout(()=>$('#f_name').focus(),100);
}

function parseIng(line){
  const m = line.match(/^([\d.,/]+\s*(?:ml|cl|oz|g|gr|dash|dashes|gotas?|cucharada?s?|cdta?|chorr[io]t?o?|partes?|barspoon|bs|piezas?|unidad(?:es)?|ramita?s?|hojas?)?\.?)\s+(.+)$/i);
  if(m && m[2]) return {q:m[1].trim(), n:m[2].trim()};
  return {q:'', n:line};
}

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); const d = new Date();
  a.href = url;
  a.download = `cocteles-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  toast('Exportado. Guárdalo en iCloud');
};
$('#importBtn').onclick = ()=>$('#importFile').click();
$('#importFile').onchange = e=>{
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    try{
      const incoming = JSON.parse(ev.target.result);
      if(!Array.isArray(incoming)) throw new Error('formato');
      const byId = {}; data.forEach(c=>byId[c.id]=c);
      let added=0, updated=0;
      incoming.forEach(c=>{
        if(!c || !c.name) return;
        if(!c.id) c.id = uid();
        if(byId[c.id]){ Object.assign(byId[c.id],c); updated++; }
        else { data.push(c); byId[c.id]=c; added++; }
      });
      save(); render();
      toast(`Importado: ${added} nuevas, ${updated} actualizadas`);
    }catch(err){ toast('No pude leer ese archivo'); }
  };
  reader.readAsText(file); e.target.value='';
};

          <button class="btn primary" id="ai_savekey" style="flex:0 0 auto;padding:10px 16px">Guardar</button>
        </div>
        <div class="ai-keysmall">Se guarda solo en este dispositivo. Consíguela en <a href="https://console.anthropic.com/settings/keys" target="_blank" rel="noopener">console.anthropic.com</a>.</div>
      </div>` : `
      <div class="ai-saved"><span>Clave guardada en este dispositivo</span><a id="ai_clearkey">Cambiar</a></div>`}
    ${aiMode==='variar' ? `
      <div class="field"><label>Cóctel a variar</label>
        <select id="ai_base">${cocteles.map(c=>`<option value="${esc(c.id)}">${esc(c.name)}</option>`).join('')}</select>
      </div>` : ''}
    <div class="field">
      <label>${aiMode==='variar'?'Indicaciones (opcional)':aiMode==='ideas'?'Enfoque (opcional)':'Qué quieres'}</label>
      <textarea id="ai_input" placeholder="${esc(m.ph)}"></textarea>
    </div>
    <div class="detail-actions">
      <button class="btn" id="ai_close">Cerrar</button>
      <button class="btn primary" id="ai_go"${!key?' disabled style="opacity:.5"':''}>Generar</button>
    </div>
    <div class="ai-results" id="ai_results"></div>
  `;
  openOverlay();

  sheetEl().querySelectorAll('.ai-mode').forEach(b=> b.onclick=()=>{ aiMode=b.dataset.m; aiLastResult=null; showAssistant(); });
  $('#ai_close').onclick = closeOverlay;
  const savekey = $('#ai_savekey');
  if(savekey) savekey.onclick = ()=>{
    const v = $('#ai_key').value.trim();
    if(!v){ toast('Pega tu clave'); return; }
    localStorage.setItem(AI_KEY, v); toast('Clave guardada'); showAssistant();
  };
  const clearkey = $('#ai_clearkey');
  if(clearkey) clearkey.onclick = ()=>{ if(confirm('¿Borrar la clave de este dispositivo?')){ localStorage.removeItem(AI_KEY); showAssistant(); } };
  const go = $('#ai_go');
  if(go) go.onclick = runAssistant;
  if(aiLastResult) renderAIResults(aiLastResult);
}
function sheetEl(){ return $('#sheet'); }

async function runAssistant(){
  const key = localStorage.getItem(AI_KEY);
  if(!key){ toast('Pon tu clave primero'); return; }
  const input = ($('#ai_input').value||'').trim();
  const carta = cartaResumen();
  let prompt;
  if(aiMode==='crear'){
    prompt = `Crea 1 o 2 cócteles nuevos y originales${input?` basados en: ${input}`:''}. Que encajen con el estilo de mi carta y no repitan los que ya tengo.\n\nMi carta actual:\n${carta}`;
  } else if(aiMode==='tengo'){
    prompt = `Tengo estos ingredientes en casa: ${input||'(no especificados)'}. Sugiéreme 2 o 3 cócteles que pueda preparar con eso (pueden ser de mi carta o nuevos). En "message" explica brevemente las opciones; en "recipes" incluye las recetas concretas.\n\nMi carta actual:\n${carta}`;
  } else if(aiMode==='variar'){
    const base = data.find(c=>c.id===$('#ai_base').value);
    if(!base){ toast('Elige un cóctel'); return; }
    prompt = `Crea 2 variaciones del cóctel "${base.name}"${input?` (${input})`:''}.\n\nReceta original:\nIngredientes: ${(base.ingredients||[]).map(i=>`${i.q} ${i.n}`).join('; ')}\nPasos: ${(base.steps||[]).join(' ')}\nNotas: ${base.notes||''}`;
  } else {
    prompt = `Sugiéreme 4 o 5 ingredientes, licores o siropes nuevos que combinarían bien con mi carta${input?` (enfoque: ${input})`:''}. Explica cada uno en "message" (con qué de mi carta combina). En "recipes" puedes incluir 1 cóctel de ejemplo que use alguno de ellos, o dejarlo vacío.\n\nMi carta actual:\n${carta}`;
  }
  const system = 'Eres un bartender experto y creativo. Respondes SIEMPRE en español de España. Las cantidades van en ml (o medidas claras como "1 cdta", "Top"). Devuelves la respuesta en el formato JSON indicado: "message" es un texto breve y útil, y "recipes" es una lista de recetas completas (categoría como "Con alcohol", "Sin alcohol" o "Siropes y prep."). Sé conciso y práctico.';

  $('#ai_results').innerHTML = '<div class="spinner"></div>';
  $('#ai_go').disabled = true;
  try{
    const result = await callClaude(system, prompt);
    aiLastResult = result;
    renderAIResults(result);
  }catch(err){
    $('#ai_results').innerHTML = `<div class="ai-err">No se pudo generar.<br>${esc(err.message||err)}</div>`;
  }finally{
    const g=$('#ai_go'); if(g) g.disabled=false;
  }
}

async function callClaude(system, userPrompt){
  const key = localStorage.getItem(AI_KEY);
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{
      'content-type':'application/json',
      'x-api-key': key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body: JSON.stringify({
      model: AI_MODEL,
      max_tokens: 4000,
      system,
      messages:[{role:'user', content:userPrompt}],
      output_config:{ format:{ type:'json_schema', schema: AI_SCHEMA } }
    })
  });
  if(!res.ok){
    let msg = 'Error '+res.status;
    try{ const e=await res.json(); if(e.error&&e.error.message) msg=e.error.message; }catch(_){}
    if(res.status===401) msg='Clave API no válida. Revísala en Cambiar.';
    throw new Error(msg);
  }
  const dataR = await res.json();
  const tb = (dataR.content||[]).find(b=>b.type==='text');
  if(!tb) throw new Error('Respuesta vacía');
  return JSON.parse(tb.text);
}

function renderAIResults(r){
  const box = $('#ai_results'); if(!box) return;
  let html = r.message ? `<div class="ai-msg">${esc(r.message)}</div>` : '';
  (r.recipes||[]).forEach((rec,idx)=>{
    html += `
      <div class="ai-rec">
        <div class="rc">${esc(rec.category||'')}${rec.glass?` · ${esc(rec.glass)}`:''}</div>
        <h4>${esc(rec.name)}</h4>
        ${(rec.ingredients||[]).length?`<ul>${rec.ingredients.map(i=>`<li><span>${esc(i.n)}</span><span class="q">${esc(i.q||'')}</span></li>`).join('')}</ul>`:''}
        ${(rec.steps||[]).length?`<ol>${rec.steps.map(s=>`<li>${esc(s)}</li>`).join('')}</ol>`:''}
        ${rec.notes?`<div class="nt">${esc(rec.notes)}</div>`:''}
        <button class="save" data-i="${idx}">Guardar en mi carta</button>
      </div>`;
  });
  box.innerHTML = html || '<div class="ai-err">No vinieron recetas. Prueba a reformular.</div>';
  box.querySelectorAll('.save').forEach(b=> b.onclick=()=>{
    const rec = r.recipes[+b.dataset.i];
    const obj = {
      id: uid(), name: rec.name, category: rec.category||'', glass: rec.glass||'',
      tags: rec.tags||[], ingredients: rec.ingredients||[], steps: rec.steps||[],
      notes: rec.notes||'', favorite:false
    };
    data.push(obj); save(); render();
    b.textContent = 'Guardado ✓'; b.classList.add('done'); b.disabled = true;
    toast(`"${rec.name}" añadido a tu carta`);
  });
}

let toastT;
function toast(msg){
  const t=$('#toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600);
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }

render();
</script>
</body>
</html>
